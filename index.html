const HW=5,BT=3,BD=3;

function rnd(a){return a[Math.floor(Math.random()*a.length)];}
function rndInt(a,b){return Math.floor(Math.random()*(b-a+1))+a;}

function getQ(usedIds,level){
  const isInfinite=(level==='nolimits');
  const pool=(Q[level]||[]).map((q,i)=>({...q,id:level+i}));
  const available=isInfinite?pool:pool.filter(q=>!usedIds.includes(q.id));
  if(!available.length)return null;
  return available[Math.floor(Math.random()*available.length)];
}

function getQText(q,gender){return gender==='f'?q.f:q.m;}

function computeMatches(picks){
  // picks = {picker: [chosen1, chosen2, ...]}
  const out=[];
  const players=Object.keys(picks);
  for(let i=0;i<players.length;i++){
    for(let j=i+1;j<players.length;j++){
      const a=players[i],b=players[j];
      const aChoseB=(picks[a]||[]).includes(b);
      const bChoseA=(picks[b]||[]).includes(a);
      if(aChoseB&&bChoseA)out.push([a,b]);
    }
  }
  return out;
}

function getAvailablePicks(picker,players,genders,biMode,blockedFor,alreadyPicked){
  const pickerGender=genders[picker];
  return players.filter(p=>{
    if(p===picker)return false;
    if(alreadyPicked.includes(p))return false;
    const bl=(blockedFor[picker]||{})[p]||0;
    if(bl>0)return false;
    // Gender filter
    const targetGender=genders[p];
    if(biMode){
      // bi mode: females pick everyone, males pick only females
      if(pickerGender==='m')return targetGender==='f';
      return true; // female picks everyone
    } else {
      // standard: m picks f, f picks m
      return pickerGender!==targetGender;
    }
  });
}

function updateBlocks(hist,newPicks,blocked){
  const nh={...hist},nb={};
  Object.entries(blocked).forEach(([p,ts])=>Object.entries(ts).forEach(([t,l])=>{if(l>1){if(!nb[p])nb[p]={};nb[p][t]=l-1;}}));
  Object.entries(newPicks).forEach(([p,cs])=>{
    if(!nh[p])nh[p]=[];
    cs.forEach(c=>{nh[p]=[...nh[p],c].slice(-HW);});
  });
  Object.entries(nh).forEach(([p,h])=>{
    const cnt={};h.forEach(t=>{cnt[t]=(cnt[t]||0)+1;});
    Object.entries(cnt).forEach(([t,n])=>{if(n>=BT){if(!nb[p])nb[p]={};nb[p][t]=BD;}});
  });
  return{nh,nb};
}

function getScreen(){
  const s=S.screen,g=S.gs;
  if(s==='splash')return splash();
  if(s==='setup')return setup();
  if(s==='settings')return settings();
  if(s==='end')return endScreen();
  if(s==='game'&&g){
    if(g.phase==='question')return questionScreen();
    if(g.phase==='picking')return pickingScreen();
    if(g.phase==='handoff')return handoffScreen();
    if(g.phase==='reveal')return revealScreen();
    if(g.phase==='task')return taskScreen();
    if(g.phase==='upgrade')return upgradeScreen();
  }
  return '';
}

// ─── GAME ACTIONS ─────────────────────────────────────────────
function startGame(){
  const q=getQ([],S.startLevel); if(!q)return;
  const defaultRounds=S.players.length*2;
  const totalRounds=S.totalRounds||defaultRounds;
  S.gs={
    phase:'question',question:q,level:S.startLevel,roundsOnLevel:1,
    picks:{},pickerIdx:0,round:1,totalRounds,
    skips:Object.fromEntries(S.players.map(p=>[p,S.maxSkips])),
    usedIds:[q.id],penalties:{},pickHistory:{},blockedFor:{},
    timerSec:0,timerRunning:false,
  };
  S.screen='game';r();
}

function startPicking(){
  S.gs.phase='picking';S.gs.pickerIdx=0;S.gs.picks={};S.gs.penalties={};r();
}

function makePick(chosen){
  const g=S.gs,picker=S.players[g.pickerIdx];
  if(!g.picks[picker])g.picks[picker]=[];
  if(g.picks[picker].includes(chosen))return;
  g.picks[picker].push(chosen);
  // If reached maxPicks or only 1 pick allowed, move to next
  const avail=getAvailablePicks(picker,S.players,S.genders,S.biMode,g.blockedFor,g.picks[picker]);
  if(g.picks[picker].length>=S.maxPicks||avail.length===0){
    advancePicker();
  } else {
    r(); // re-render to show updated picks count
  }
}

function confirmPicks(){
  advancePicker();
}

function advancePicker(){
  const g=S.gs;
  if(g.pickerIdx+1>=S.players.length) finishRound();
  else{g.pickerIdx++;g.phase='handoff';r();}
}

function doSkip(){
  const g=S.gs,picker=S.players[g.pickerIdx];
  if((g.skips[picker]||0)<=0)return;
  g.skips[picker]--;
  g.penalties[picker]=rnd(PENALTIES);
  advancePicker();
}

function continueHandoff(){S.gs.phase='picking';r();}

function finishRound(){
  const g=S.gs;
  const{nh,nb}=updateBlocks(g.pickHistory,g.picks,g.blockedFor);
  g.pickHistory=nh;g.blockedFor=nb;g.phase='reveal';r();
}

function showTask(){
  const g=S.gs;
  // #3 Random timer 10-60s
  g.timerSec=rndInt(10,60);
  g.timerRunning=false;
  g.phase='task';r();
}

function startTimer(){
  const g=S.gs;
  if(g.timerRunning)return;
  g.timerRunning=true;
  clearInterval(S.timerInterval);
  S.timerInterval=setInterval(()=>{
    if(!S.gs||S.gs.phase!=='task'){clearInterval(S.timerInterval);return;}
    S.gs.timerSec--;
    if(S.gs.timerSec<=0){
      S.gs.timerSec=0;clearInterval(S.timerInterval);
      S.gs.timerRunning=false;S.gs.timerDone=true;
    }
    r();
  },1000);
}

function nextRound(){
  clearInterval(S.timerInterval);
  const g=S.gs;
  const newRL=g.roundsOnLevel+1;
  const isLast=g.level==='nolimits';
  const nextIdx=LEVELS.indexOf(g.level)+1;
  const hasNext=nextIdx<LEVELS.length;

  // Check total rounds limit (#4)
  if(g.round>=g.totalRounds&&!isLast){S.screen='end';r();return;}

  if(!isLast&&newRL>UPGRADE_EVERY&&hasNext){g.roundsOnLevel=newRL;g.phase='upgrade';r();return;}
  const q=getQ(g.usedIds,g.level);
  if(!q){
    if(!isLast&&hasNext){g.roundsOnLevel=newRL;g.phase='upgrade';r();}
    else if(!isLast){S.screen='end';r();}
    else{
      // nolimits infinite - reset usedIds and try again
      g.usedIds=[];const q2=getQ([],g.level);if(!q2){S.screen='end';r();return;}
      g.usedIds=[q2.id];g.phase='question';g.question=q2;g.picks={};g.pickerIdx=0;g.round++;g.roundsOnLevel=newRL;g.penalties={};r();
    }
    return;
  }
  g.phase='question';g.question=q;g.picks={};g.pickerIdx=0;
  g.round++;g.roundsOnLevel=newRL;g.usedIds.push(q.id);g.penalties={};g.timerDone=false;r();
}

function acceptUpgrade(){
  const g=S.gs,nextLevel=LEVELS[LEVELS.indexOf(g.level)+1];
  const q=getQ(g.usedIds,nextLevel);if(!q){S.screen='end';r();return;}
  g.level=nextLevel;g.roundsOnLevel=1;g.phase='question';g.question=q;
  g.picks={};g.pickerIdx=0;g.round++;g.usedIds.push(q.id);g.penalties={};r();
}

function stayLevel(){
  const g=S.gs,q=getQ(g.usedIds,g.level);if(!q){S.screen='end';r();return;}
  g.phase='question';g.question=q;g.picks={};g.pickerIdx=0;
  g.round++;g.roundsOnLevel=1;g.usedIds.push(q.id);g.penalties={};r();
}

function resetGame(){
  clearInterval(S.timerInterval);
  S.screen='splash';S.gs=null;S.players=[];S.genders={};
  S.startLevel='warm';S.maxSkips=2;S.maxPicks=1;S.biMode=false;S.totalRounds=0;r();
}

}

function upgradeScreen(){
  const g=S.gs,curr=CAT[g.level],nextId=LEVELS[LEVELS.indexOf(g.level)+1],next=CAT[nextId];
  return wrap(`
    <div style="font-size:48px;margin-bottom:8px">🔥</div>
    <p style="color:rgba(255,255,255,0.35);font-size:13px;letter-spacing:0.1em;text-transform:uppercase;margin-bottom:8px">${UPGRADE_EVERY} раундов позади</p>
    <h2 class="syne" style="font-size:28px;font-weight:800;margin-bottom:24px;letter-spacing:-0.02em">Готовы к следующему уровню?</h2>
    <div style="display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:28px">
      <div style="padding:12px 18px;border-radius:14px;background:${curr.color}18;border:1.5px solid ${curr.color}50"><div style="font-size:26px">${curr.emoji}</div><div style="font-weight:700;color:${curr.color};font-size:14px;margin-top:3px">${curr.name}</div></div>
      <div style="font-size:24px;color:rgba(255,255,255,0.3)">→</div>
      <div class="uglow" style="padding:12px 18px;border-radius:14px;background:${next.color}25;border:2px solid ${next.color}80"><div style="font-size:26px">${next.emoji}</div><div style="font-weight:700;color:${next.color};font-size:14px;margin-top:3px">${next.name}</div></div>
    </div>
    <button onclick="acceptUpgrade()" style="width:100%;background:${next.color};color:#fff;border:none;border-radius:18px;padding:18px;font-size:18px;font-weight:700;cursor:pointer;margin-bottom:10px;box-shadow:0 0 36px ${next.color}50;font-family:'DM Sans',sans-serif">${next.emoji} Переходим на «${next.name}»</button>
    <button onclick="stayLevel()" style="width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.12);border-radius:18px;padding:14px;font-size:15px;font-weight:600;cursor:pointer;color:rgba(255,255,255,0.5);font-family:'DM Sans',sans-serif">Ещё раунд на «${curr.name}»</button>
  `);
}

// ─── PLAYER ACTIONS ───────────────────────────────────────────
function goSetup(){S.screen='setup';r();}
function goSettings(){S.screen='settings';r();}

function addPlayerWithGender(gender){
  const inp=document.getElementById('nameInput');
  const name=(inp?inp.value:S.inputName).trim();
  if(name&&!S.players.includes(name)&&S.players.length<8){
    S.players.push(name);S.genders[name]=gender;S.inputName='';r();
  }
}
function addPlayerM(){addPlayerWithGender('m');}
function addPlayerF(){addPlayerWithGender('f');}
function addPlayer(){addPlayerWithGender('m');} // default male on Enter

function toggleGender(name){
  S.genders[name]=S.genders[name]==='m'?'f':'m';r();
}

function removePlayer(i){
  const name=S.players[i];
  S.players.splice(i,1);
  delete S.genders[name];r();
}

// Boot
r();
</script>
</body>
</html>
