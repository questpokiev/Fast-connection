.mglow{animation:matchGlow 1.6s ease infinite}
.blink{animation:blink 1.2s ease infinite}
.uglow{animation:uglow 1.8s ease infinite}
button{cursor:pointer;font-family:'DM Sans',sans-serif;transition:transform .1s}
button:active{transform:scale(.95)!important}
input{font-family:'DM Sans',sans-serif;outline:none}

// ── Helpers ────────────────────────────────────────────────────
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function getQ(usedIds,level){
  const pool=(Q[level]||[]).map((q,i)=>({...q,id:level+i})).filter(q=>!usedIds.includes(q.id));
  if(!pool.length)return null;
  return pool[Math.floor(Math.random()*pool.length)];
}
function matches(picks){
  const keys=Object.keys(picks),out=[];
  for(let i=0;i<keys.length;i++)for(let j=i+1;j<keys.length;j++){const a=keys[i],b=keys[j];if(picks[a]===b&&picks[b]===a)out.push([a,b]);}
  return out;
}
function updateBlocks(hist,newPicks,blocked){
  const nh={...hist},nb={};
  Object.entries(blocked).forEach(([p,ts])=>Object.entries(ts).forEach(([t,l])=>{if(l>1){if(!nb[p])nb[p]={};nb[p][t]=l-1;}}));
  Object.entries(newPicks).forEach(([p,c])=>{if(!nh[p])nh[p]=[];nh[p]=[...nh[p],c].slice(-HW);});
  Object.entries(nh).forEach(([p,h])=>{const cnt={};h.forEach(t=>{cnt[t]=(cnt[t]||0)+1;});Object.entries(cnt).forEach(([t,n])=>{if(n>=BT){if(!nb[p])nb[p]={};nb[p][t]=BD;}});});
  return{nh,nb};
}

function r(){
  const el=document.getElementById('root');
  el.innerHTML=getScreen();
}

function getScreen(){
  const s=S.screen,g=S.gs;
  if(s==='splash')return splash();
  if(s==='setup')return setup();
  if(s==='settings')return settings();
  if(s==='end')return end();
  if(s==='game'&&g){
    if(g.phase==='question')return questionScreen();
    if(g.phase==='picking')return pickingScreen();
    if(g.phase==='handoff')return handoffScreen();
    if(g.phase==='reveal')return revealScreen();
    if(g.phase==='task')return taskScreen();
    if(g.phase==='upgrade')return upgradeScreen();
  }
  return '<div style="color:white;padding:40px">...</div>';
}

  return `<div class="screen" style="text-align:${center?'center':'left'}">${inner}</div>`;

function revealScreen(){
  const g=S.gs;
  const ms=matches(g.picks),mset=new Set(ms.flat());
  const hasM=ms.length>0,hasP=Object.keys(g.penalties).length>0;
  const rows=S.players.map(p=>{

      <span style="font-weight:700;font-size:16px;color:${isM?'#00FF88':skipped?'rgba(255,255,255,0.25)':'#fff'}">${p}</span>
      <span style="font-size:15px;color:${isM?'#00FF88':skipped?'rgba(255,255,255,0.2)':'rgba(255,255,255,0.55)'}">${skipped?'пропустил ⚡':`→ ${chose}${isM?' 💚':''}`}</span>
    </div>`;
  }).join('');
  const nb=[];

  const blockNote=nb.length?`<div style="background:rgba(255,100,0,0.07);border:1px solid rgba(255,100,0,0.2);border-radius:12px;padding:12px 16px;margin-bottom:12px"><div style="font-weight:700;font-size:13px;color:#FF6B35;margin-bottom:6px">🚫 Новые ограничения:</div>${nb.map(({p,t})=>`<div style="font-size:13px;color:rgba(255,255,255,0.6);margin-bottom:3px"><strong style="color:#fff">${p}</strong> заблокировал <strong style="color:#fff">${t}</strong> на ${BD} вопроса</div>`).join('')}</div>`:'';
  const penNote=hasP?`<div style="background:rgba(255,100,0,0.07);border:1px solid rgba(255,100,0,0.2);border-radius:12px;padding:12px 16px;margin-bottom:12px"><div style="font-weight:700;font-size:13px;color:#FF6B35;margin-bottom:8px">⚡ Штрафы за скип:</div>${Object.entries(g.penalties).map(([pl,pen])=>`<div style="font-size:14px;color:rgba(255,255,255,0.65);margin-bottom:4px"><strong style="color:#fff">${pl}</strong>: ${pen}</div>`).join('')}</div>`:'';
  return wrap(`
    <div style="text-align:center;margin-bottom:24px">
      <div style="font-size:44px;margin-bottom:10px">${hasM?'💥':'🫤'}</div>
      <h2 class="syne" style="font-size:32px;font-weight:800;letter-spacing:-0.03em">${hasM?'Есть совпадение!':'Без совпадений'}</h2>
      ${!hasM?'<p style="color:rgba(255,255,255,0.35);font-size:15px;margin-top:6px">Не повезло — в следующий раз! 🥲</p>':''}
    </div>
    ${rows}
    ${blockNote}${penNote}
    <button onclick="${hasM?'showTask()':'nextRound()'}" style="width:100%;border:none;border-radius:18px;padding:18px;font-size:18px;font-weight:700;cursor:pointer;background:${hasM?'#00FF88':'#FF3366'};color:${hasM?'#000':'#fff'};box-shadow:${hasM?'0 0 36px rgba(0,255,136,0.3)':'0 0 30px rgba(255,51,102,0.3)'};margin-top:4px;font-family:'DM Sans',sans-serif">
      ${hasM?'Посмотреть задание 💚':'Следующий раунд →'}

  `,false);
}

// ── Actions ────────────────────────────────────────────────────
function goSetup(){S.screen='setup';r();}
function goSettings(){S.screen='settings';r();}
function addPlayer(){
  const inp=document.getElementById('nameInput');
  const name=(inp?inp.value:S.inputName).trim();
  if(name&&!S.players.includes(name)&&S.players.length<8){S.players.push(name);S.inputName='';r();}
}
function removePlayer(i){S.players.splice(i,1);r();}

function startGame(){
  const q=getQ([],S.startLevel);if(!q)return;
  S.gs={phase:'question',question:q,level:S.startLevel,roundsOnLevel:1,picks:{},pickerIdx:0,round:1,
    skips:Object.fromEntries(S.players.map(p=>[p,S.maxSkips])),
    usedIds:[q.id],penalties:{},pickHistory:{},blockedFor:{}};
  S.screen='game';r();
}

function startPicking(){
  S.gs.phase='picking';S.gs.pickerIdx=0;S.gs.picks={};S.gs.penalties={};r();
}

function makePick(chosen){
  const g=S.gs,picker=S.players[g.pickerIdx];
  g.picks[picker]=chosen;
  if(g.pickerIdx+1>=S.players.length)finishRound();
  else{g.pickerIdx++;g.phase='handoff';r();}
}

function doSkip(){
  const g=S.gs,picker=S.players[g.pickerIdx];
  if((g.skips[picker]||0)<=0)return;
  g.skips[picker]--;
  g.penalties[picker]=rnd(PENALTIES);
  if(g.pickerIdx+1>=S.players.length)finishRound();
  else{g.pickerIdx++;g.phase='handoff';r();}
}

function continueHandoff(){S.gs.phase='picking';r();}

function finishRound(){
  const g=S.gs;
  const {nh,nb}=updateBlocks(g.pickHistory,g.picks,g.blockedFor);
  g.pickHistory=nh;g.blockedFor=nb;g.phase='reveal';r();
}

function showTask(){S.gs.phase='task';r();}

function nextRound(){
  const g=S.gs;
  const newRL=g.roundsOnLevel+1;
  const nextIdx=LEVELS.indexOf(g.level)+1;
  const hasNext=nextIdx<LEVELS.length;
  if(newRL>UPGRADE_EVERY&&hasNext){g.roundsOnLevel=newRL;g.phase='upgrade';r();return;}
  const q=getQ(g.usedIds,g.level);
  if(!q){if(hasNext){g.roundsOnLevel=newRL;g.phase='upgrade';r();}else S.screen='end';r();return;}
  g.phase='question';g.question=q;g.picks={};g.pickerIdx=0;g.round++;g.roundsOnLevel=newRL;g.usedIds.push(q.id);g.penalties={};r();
}

function acceptUpgrade(){
  const g=S.gs,nextLevel=LEVELS[LEVELS.indexOf(g.level)+1];
  const q=getQ(g.usedIds,nextLevel);if(!q){S.screen='end';r();return;}
  g.level=nextLevel;g.roundsOnLevel=1;g.phase='question';g.question=q;g.picks={};g.pickerIdx=0;g.round++;g.usedIds.push(q.id);g.penalties={};r();
}

function stayLevel(){
  const g=S.gs,q=getQ(g.usedIds,g.level);if(!q){S.screen='end';r();return;}
  g.phase='question';g.question=q;g.picks={};g.pickerIdx=0;g.round++;g.roundsOnLevel=1;g.usedIds.push(q.id);g.penalties={};r();
}

function resetGame(){S.screen='splash';S.gs=null;S.players=[];S.startLevel='warm';S.maxSkips=2;r();}
